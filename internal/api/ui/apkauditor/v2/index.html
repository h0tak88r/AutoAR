<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APK Auditor v2 — AutoAR Enhanced</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; frame-ancestors 'self';">
<link rel="icon" type="image/svg+xml" href="../icons/icon-192.svg">
<link rel="stylesheet" href="src/styles.css">
</head>
<body>

<!-- LOADING OVERLAY -->
<div id="loadingOverlay" class="loading-overlay" style="display:none">
  <div class="loading-card">
    <div class="loading-spinner"></div>
    <div class="loading-file" id="loadingFile"></div>
    <div class="loading-bar"><div class="loading-fill" id="loadingFill"></div></div>
    <div class="loading-text" id="loadingText">Preparing…</div>
  </div>
</div>

<!-- TOAST -->
<div id="toastContainer" class="toast-container"></div>

<!-- LANDING -->
<section id="landing" class="landing">
  <div class="hero-bg">
    <div class="mesh"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="hero-content">
    <div class="badge-row">
      <span class="ver-badge">v2.0 — AutoAR Enhanced</span>
    </div>
    <h1 class="hero-title">APK <span class="grad">Auditor</span></h1>
    <p class="hero-sub">Drop an APK to scan for security issues — hardcoded secrets, weak crypto, exported components, manifest misconfigs, and more.</p>
    <div class="dropzone" id="dropZone">
      <div class="dz-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="18" y="8" width="12" height="28" rx="2" fill="currentColor" opacity="0.15"/><rect x="12" y="18" width="24" height="16" rx="2" fill="currentColor" opacity="0.3"/><path d="M24 4v16m-6-6 6-6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="dz-text">
        <span class="dz-title">Drop APK file here</span>
        <span class="dz-sub">or click to browse</span>
      </div>
      <input type="file" id="fileInput" accept=".apk" hidden>
    </div>
    <div class="feature-row">
      <div class="feature-pill">🔍 Pattern rules</div>
      <div class="feature-pill">📱 Manifest parser</div>
      <div class="feature-pill">🔐 Cert analysis</div>
      <div class="feature-pill">🔑 Secret detection</div>
    </div>
  </div>
</section>

<!-- APP -->
<div id="appContainer" style="display:none">
  <header id="appHeader">
    <div class="header-left"><span class="app-logo">APK Auditor</span></div>
    <div class="header-center">
      <nav id="tabNav">
        <button class="tab-btn active" data-tab="overview">Overview</button>
        <button class="tab-btn" data-tab="findings">Findings</button>
        <button class="tab-btn" data-tab="manifest">Manifest</button>
        <button class="tab-btn" data-tab="components">Components</button>
        <button class="tab-btn" data-tab="cert">Cert</button>
        <button class="tab-btn" data-tab="explorer">Explorer</button>
      </nav>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="btnTheme" title="Toggle theme">🌓</button>
      <div class="export-dropdown">
        <button class="btn btn-export" id="btnExport">Export ▾</button>
        <div class="export-menu" id="exportMenu">
          <button data-format="pdf">📄 PDF Report</button>
          <button data-format="json">📋 JSON</button>
          <button data-format="csv">📊 CSV</button>
          <button data-format="sarif">🛡️ SARIF 2.1</button>
        </div>
      </div>
    </div>
  </header>
  <main id="appMain">
    <div id="panel-overview" class="tab-panel active"></div>
    <div id="panel-findings" class="tab-panel"></div>
    <div id="panel-manifest" class="tab-panel"></div>
    <div id="panel-components" class="tab-panel"></div>
    <div id="panel-cert" class="tab-panel"></div>
    <div id="panel-explorer" class="tab-panel"></div>
  </main>
</div>

<script src="lib/jszip.min.js"></script>
<script src="lib/jspdf.umd.min.js"></script>
<script src="src/core/engine.js"></script>
<script src="src/core/entropy.js"></script>
<script src="src/core/export.js"></script>
<script src="src/core/pdf.js"></script>
<script src="src/main.js"></script>
</body>
</html>
